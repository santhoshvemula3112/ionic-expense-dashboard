<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Add Expense</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="floating">Expense Name</ion-label>
    <ion-input [(ngModel)]="name"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Amount</ion-label>
    <ion-input type="number" [(ngModel)]="amount"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Date</ion-label>
    <ion-input type="date" [(ngModel)]="date"></ion-input>
  </ion-item>

  <ion-button expand="block" color="primary" (click)="addExpense()">
    Add Expense
  </ion-button>

</ion-content>
