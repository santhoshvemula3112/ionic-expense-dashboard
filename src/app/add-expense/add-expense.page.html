<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ editIndex !== null ? 'Edit Expense' : 'Add Expense' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-content>

      <ion-item>
        <ion-label position="floating">Expense Name</ion-label>
        <ion-input [(ngModel)]="name"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Amount</ion-label>
        <ion-input type="number" [(ngModel)]="amount"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Date</ion-label>
        <ion-input type="date" [(ngModel)]="date"></ion-input>
      </ion-item>

      <ion-button expand="block" color="primary" (click)="saveExpense()">
        {{ editIndex !== null ? 'Update Expense' : 'Add Expense' }}
      </ion-button>

    </ion-card-content>
  </ion-card>

</ion-content>
