<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-title>Total Expenses: ${{ getTotal() }}</ion-card-title>
    </ion-card-header>
  </ion-card>

  <ion-list>
    <ion-item *ngFor="let expense of expenses; let i = index">
      <ion-label>
        <h2>{{ expense.name }}</h2>
        <p>{{ expense.date }}</p>
      </ion-label>

      <ion-text color="danger" class="amount-text">
        <strong>${{ expense.amount }}</strong>
      </ion-text>

      <ion-button fill="clear" color="primary" (click)="goToEditExpense(i)">
        Edit
      </ion-button>

      <ion-button fill="clear" color="danger" (click)="deleteExpense(i)">
        Delete
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-button expand="block" color="primary" (click)="goToAddExpense()">
    Add New Expense
  </ion-button>

</ion-content>
