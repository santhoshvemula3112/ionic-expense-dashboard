<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Expense Tracker</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="dashboard-content">

  <!-- Total Card -->
  <ion-card class="summary-card">
    <ion-card-content>
      <p>Total Expenses</p>
      <h1>${{ getTotal() }}</h1>
    </ion-card-content>
  </ion-card>

  <!-- Expense List -->
  <ion-list>

    <ion-item *ngFor="let expense of expenses; let i = index">

      <ion-label>
        <h2>{{ expense.name }}</h2>
        <p>{{ expense.date }}</p>
      </ion-label>

      <ion-text color="danger">
        <strong>${{ expense.amount }}</strong>
      </ion-text>

      <ion-button fill="clear" size="small" color="primary" (click)="goToEditExpense(i)">
        Edit
      </ion-button>

      <ion-button fill="clear" size="small" color="danger" (click)="deleteExpense(i)">
        Delete
      </ion-button>

    </ion-item>

  </ion-list>

  <!-- Floating Add Button -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="goToAddExpense()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
